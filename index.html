<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<nav>
<h2>Naeem</h2>

<ul>
<li><a href="#home">Home</a></li>
<li><a href="#projects">Projects</a></li>
<li><a href="#contact">Contact</a></li>
</ul>

<button id="theme-toggle">Dark Mode</button>
</nav>
</header>

<main>

<!-- HOME SECTION -->

<section id="home" class="home">

<h1>Hello, I'm Naeem</h1>
<p>CSE Student & Future Software Developer</p>

<p>
I am passionate about programming, web development, and AI.
I enjoy building software projects and learning new technologies.
</p>

</section>


<!-- PROJECTS SECTION -->

<section id="projects">

<h2>My Projects</h2>

<div id="project-container" class="project-container">

</div>

</section>


<!-- CONTACT SECTION -->

<section id="contact">

<h2>Contact Me</h2>

<form id="contact-form">

<input type="text" id="name" placeholder="Your Name">

<span class="error" id="nameError"></span>

<input type="email" id="email" placeholder="Your Email">

<span class="error" id="emailError"></span>

<input type="text" id="subject" placeholder="Subject">

<span class="error" id="subjectError"></span>

<textarea id="message" placeholder="Message"></textarea>

<span class="error" id="messageError"></span>

<button type="submit">Send Message</button>

</form>

</section>

</main>


<footer>

<p>© 2026 Naeem Portfolio</p>

</footer>


<button id="topBtn">↑</button>

<script src="script.js"></script>

</body>
</html>
